name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-api:
    name: ci-api
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Guard CI secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${STRIPE_SECRET_KEY:-}" == sk_live_* ]]; then
            echo "STRIPE_SECRET_KEY must use a test-mode key in CI." >&2
            exit 1
          fi
          if [[ "${SUPABASE_URL:-}" == *"vebhoeiltxspsurqoxvl"* ]]; then
            echo "SUPABASE_URL points at the production Supabase project." >&2
            exit 1
          fi
          if [[ "${PUBLIC_SUPABASE_URL:-}" == *"vebhoeiltxspsurqoxvl"* ]]; then
            echo "PUBLIC_SUPABASE_URL points at the production Supabase project." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
